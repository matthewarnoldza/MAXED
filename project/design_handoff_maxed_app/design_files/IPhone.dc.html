<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:417px;height:876px;flex:none;">
  <div style="position:absolute;inset:0;background:#0b0b0c;border-radius:58px;box-shadow:0 0 0 2px #2a2a2c, 0 2px 6px rgba(0,0,0,.25), 0 34px 70px -24px rgba(0,0,0,.5);"></div>
  <div style="position:absolute;inset:11px;border-radius:47px;overflow:hidden;background:{{ bg }};">
    <div style="position:absolute;inset:0;">{{ children }}</div>
    <div style="position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 30px 0 34px;z-index:50;pointer-events:none;color:{{ chrome }};">
      <div style="font:600 16px/1 -apple-system,system-ui;letter-spacing:.2px;min-width:54px;">{{ time }}</div>
      <div style="display:flex;align-items:center;gap:7px;">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5.5" width="3" height="6.5" rx="1"/><rect x="10" y="3" width="3" height="9" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.2c2.6 0 5 1 6.8 2.7l1.4-1.5C14.6 1.2 11.7 0 8.5 0 5.3 0 2.4 1.2 .3 3.4l1.4 1.5C3.5 3.2 5.9 2.2 8.5 2.2z"/><path d="M8.5 6c1.4 0 2.7.5 3.7 1.5l1.4-1.5C12.2 4.7 10.4 4 8.5 4 6.6 4 4.8 4.7 3.4 6l1.4 1.5C5.8 6.5 7.1 6 8.5 6z"/><circle cx="8.5" cy="10" r="1.8"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="18" height="9" rx="1.8" fill="currentColor"/><path d="M24 4.6v3.8c.9-.3 1.4-.95 1.4-1.9s-.5-1.6-1.4-1.9z" fill="currentColor" fill-opacity="0.5"/></svg>
      </div>
    </div>
    <div style="position:absolute;top:11px;left:50%;transform:translateX(-50%);width:124px;height:36px;background:#000;border-radius:20px;z-index:60;"></div>
    <div style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:138px;height:5px;border-radius:3px;background:{{ chrome }};opacity:.85;z-index:60;pointer-events:none;"></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:417,&quot;height&quot;:876},&quot;bg&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#000&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;chrome&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#fff&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;time&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;9:41&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
